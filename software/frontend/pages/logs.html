<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Robot Activity Logs</title>

    <link rel="stylesheet" href="../css/logs.css">

    <script defer src="../js/api.js"></script>
    <script defer src="../js/logs.js"></script>

</head>

<body>

<header>

    <h1>📋 Robot Activity Logs</h1>

    <nav>

        <a href="../index.html">Dashboard</a>

        <a href="logs.html">Logs</a>

        <a href="settings.html">Settings</a>

    </nav>

</header>

<div class="container">

    <!-- Search -->

    <section class="toolbar">

        <input
            type="text"
            id="searchInput"
            placeholder="Search command...">

        <button id="refreshBtn">

            🔄 Refresh

        </button>

        <button id="clearBtn">

            🗑 Clear Logs

        </button>

        <button id="exportBtn">

            📥 Export CSV

        </button>

    </section>

    <!-- Statistics -->

    <section class="stats">

        <div class="card">

            <h3>Total Logs</h3>

            <h2 id="totalLogs">0</h2>

        </div>

        <div class="card">

            <h3>Today's Commands</h3>

            <h2 id="todayLogs">0</h2>

        </div>

        <div class="card">

            <h3>Last Command</h3>

            <h2 id="lastCommand">None</h2>

        </div>

    </section>

    <!-- Table -->

    <section class="table-container">

        <table id="logsTable">

            <thead>

                <tr>

                    <th>#</th>

                    <th>Time</th>

                    <th>Command</th>

                    <th>Status</th>

                </tr>

            </thead>

            <tbody id="logsBody">

                <tr>

                    <td colspan="4">

                        No logs available

                    </td>

                </tr>

            </tbody>

        </table>

    </section>

</div>

<footer>

    IoT Weed Detection & Removal Robot

</footer>

</body>

</html>
