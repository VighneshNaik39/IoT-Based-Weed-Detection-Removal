<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard Settings</title>

    <link rel="stylesheet" href="../css/settings.css">

    <script defer src="../js/settings.js"></script>

</head>

<body>

<header>

    <h1>⚙ Dashboard Settings</h1>

    <nav>

        <a href="../index.html">Dashboard</a>

        <a href="logs.html">Logs</a>

        <a href="settings.html">Settings</a>

    </nav>

</header>

<div class="container">

    <!-- Backend Settings -->

    <div class="card">

        <h2>Backend Configuration</h2>

        <label>Backend API URL</label>

        <input
            type="text"
            id="backendURL"
            placeholder="http://localhost:3000">

    </div>

    <!-- Robot Settings -->

    <div class="card">

        <h2>Robot Settings</h2>

        <label>Robot Name</label>

        <input
            type="text"
            id="robotName"
            placeholder="IoT Weed Robot">

        <label>Auto Refresh (seconds)</label>

        <select id="refreshInterval">

            <option value="2">2 Seconds</option>

            <option value="5">5 Seconds</option>

            <option value="10">10 Seconds</option>

            <option value="15">15 Seconds</option>

        </select>

    </div>

    <!-- Theme -->

    <div class="card">

        <h2>Theme</h2>

        <select id="theme">

            <option value="dark">

                Dark Theme

            </option>

            <option value="light">

                Light Theme

            </option>

        </select>

    </div>

    <!-- Buttons -->

    <div class="buttons">

        <button id="saveBtn">

            💾 Save Settings

        </button>

        <button id="resetBtn">

            🔄 Reset

        </button>

    </div>

    <!-- About -->

    <div class="card">

        <h2>About Project</h2>

        <p>

            IoT-Based Weed Detection &
            Robotic Weed Removal System

        </p>

        <hr>

        <p>

            Version : 1.0

        </p>

        <p>

            Frontend Developer :
            Member 2

        </p>

        <p>

            Final Year BE Project

        </p>

    </div>

</div>

<footer>

IoT Weed Detection & Removal Robot

</footer>

</body>

</html>
