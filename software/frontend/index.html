<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IoT Weed Detection Robot Dashboard</title>

    <link rel="stylesheet" href="css/style.css">

    <script defer src="js/api.js"></script>
    <script defer src="js/script.js"></script>
</head>

<body>

<!-- ================= NAVBAR ================= -->

<header>

    <h1>🌿 IoT Weed Detection & Removal Robot</h1>

    <nav>

        <a href="index.html">Dashboard</a>

        <a href="pages/logs.html">Logs</a>

        <a href="pages/settings.html">Settings</a>

    </nav>

</header>

<!-- ================= MAIN ================= -->

<div class="container">

    <!-- STATUS -->

    <section class="status-section">

        <div class="card">

            <h2>Robot Status</h2>

            <h3 id="robotStatus">STOPPED</h3>

        </div>

        <div class="card">

            <h2>Connection</h2>

            <h3 id="connectionStatus">Checking...</h3>

        </div>

        <div class="card">

            <h2>Battery</h2>

            <h3 id="batteryStatus">100%</h3>

        </div>

        <div class="card">

            <h2>Obstacle</h2>

            <h3 id="obstacleStatus">CLEAR</h3>

        </div>

    </section>



    <!-- CONTROL PANEL -->

    <section class="control-panel">

        <h2>Robot Movement</h2>

        <div class="movement-grid">

            <button
                id="forwardBtn"
                class="move-btn forward">
                ⬆
            </button>

            <button
                id="leftBtn"
                class="move-btn left">
                ⬅
            </button>

            <button
                id="stopBtn"
                class="move-btn stop">
                ■
            </button>

            <button
                id="rightBtn"
                class="move-btn right">
                ➡
            </button>

            <button
                id="backwardBtn"
                class="move-btn backward">
                ⬇
            </button>

        </div>

    </section>



    <!-- CUTTER -->

    <section class="cutter-panel">

        <h2>Cutter Control</h2>

        <div class="cutter-buttons">

            <button
                id="cutterOnBtn"
                class="on">

                START CUTTER

            </button>

            <button
                id="cutterOffBtn"
                class="off">

                STOP CUTTER

            </button>

        </div>

    </section>



    <!-- EMERGENCY -->

    <section class="emergency">

        <button id="emergencyBtn">

            🚨 EMERGENCY STOP

        </button>

    </section>



    <!-- LIVE ACTIVITY -->

    <section class="activity">

        <h2>Recent Activity</h2>

        <ul id="activityList">

            <li>No Activity Yet</li>

        </ul>

    </section>

</div>



<!-- FOOTER -->

<footer>

    <p>

        Final Year Project |
        IoT Weed Detection &
        Removal Robot

    </p>

</footer>

</body>
</html>
